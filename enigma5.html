<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>O começo diz tudo</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    img {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 200px;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="ima5.png" width="400">

    <h2></h2>
    <p></p>

    <input type="text" id="resposta" placeholder="Digite sua resposta">
    <br>
    <button onclick="verificar()">Confirmar</button>
    

  </div>
  <audio id="audioCerto" src="acerto.mp3"></audio>

  <script>
    function verificar() {
      const resposta = document.getElementById("resposta").value
        .toLowerCase()
        .trim();

      if (resposta === "minha princesa") {
       document.getElementById("audioCerto").play();
        window.location.href = "enigma6.html";
      } else {
        alert("❌ Resposta errada, tenta de novo!");
      }
    }
  </script>
</body>
</html>
