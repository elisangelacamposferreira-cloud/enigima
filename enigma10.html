<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rato?</title>

  <style>
    body {
      display: flex;
      
    
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    img {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 200px;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="ima10.png" width="200">
    
    <h2>

    <p>A resposta esta no rato.</p>

    <input type="text" id="resposta" placeholder="Digite sua resposta">
    <br>
    <button onclick="verificar()">Confirmar</button>

  </div>

  <script>
    function verificar() {
      const resposta = document.getElementById("resposta").value
        .toLowerCase()
        .trim();

      if (resposta === "sim") {
        window.location.href = "enigma11.html";
      } else {
        alert("❌ Resposta errada, tenta de novo!");
      }
    }
  </script>
</body>
</html>
