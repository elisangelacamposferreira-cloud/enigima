<body>

    style="position:absolute; left:50px; bottom:82%; transform: rotate(0deg);">

</div>

<input type="text" id="resposta" placeholder="Digite sua resposta">
<br>
<button onclick="verificar()">Confirmar</button>

<script>

/* mover peças */

let pecaSelecionada = null
let offsetX = 0
let offsetY = 0

document.querySelectorAll(".peca").forEach(peca=>{

peca.addEventListener("mousedown",(e)=>{

pecaSelecionada = peca
offsetX = e.clientX - peca.offsetLeft
offsetY = e.clientY - peca.offsetTop

})

})

document.addEventListener("mousemove",(e)=>{

if(pecaSelecionada){

pecaSelecionada.style.left = (e.clientX - offsetX) + "px"
pecaSelecionada.style.top = (e.clientY - offsetY) + "px"

}

})

document.addEventListener("mouseup",()=>{

pecaSelecionada = null

})

/* sistema de resposta */

function verificar(){

const resposta = document
.getElementById("resposta")
.value
.toLowerCase()
.trim()

if(resposta === "kath s2 ruan" || resposta === "kaths2ruan"){

window.location.href = "enigma10.html"

}else{

alert("❌ Resposta errada, tenta de novo!")

}

}

</script>
