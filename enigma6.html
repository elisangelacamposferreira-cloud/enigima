<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Enigma 1</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    img {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 200px;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="ima3.png" width="700">

    <p>🔊 Ouça o áudio com atenção</p>

    <!-- BOTÃO PLAY -->
    <button onclick="tocarAudio()">▶️ Play</button>

    <br><br>

    <input type="text" id="resposta" placeholder="Digite sua resposta">
    <br>
    <button onclick="verificar()">Confirmar</button>

  </div>

  <!-- ÁUDIO DO ENIGMA -->
  <audio id="audioEnigma" src="audioenigma6.mp3"></audio>

  <script>
    function tocarAudio() {
      document.getElementById("audioEnigma").play();
    }

    function verificar() {
      const resposta = document.getElementById("resposta").value
        .toLowerCase()
        .trim();

      if (resposta === "teste") {
        window.location.href = "enigma7.html";
      } else {
        alert("❌ Resposta errada, tenta de novo!");
      }
    }
  </script>
</body>
